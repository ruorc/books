<!doctype html>
<html
  lang="en"
  class="preload bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-50"
>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern book catalog application with offline sync and advanced filtering."
    />
    <title>Books Management System</title>

    <script>
      (function () {
        const savedTheme = localStorage.getItem('books-theme');
        const prefersDark = window.matchMedia(
          '(prefers-color-scheme: dark)'
        ).matches;
        const isDarkMode =
          savedTheme === 'dark' || (!savedTheme && prefersDark);

        document.documentElement.classList.toggle('dark', isDarkMode);

        // Safely clear the preload marker after layout paint
        window.addEventListener('DOMContentLoaded', () => {
          requestAnimationFrame(() => {
            document.documentElement.classList.remove('preload');
          });
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
